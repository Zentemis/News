name: Update News

on:
  schedule:
    # Every 3 hours at :00 UTC
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch news
        run: python src/newsfetch.py

      - name: Commit and push
        run: |
          git config user.name "Meridian Bot"
          git config user.email "bot@meridian.dev"
          git add docs/data/news.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update news feed — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
